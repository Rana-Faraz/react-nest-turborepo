services:
  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    volumes:
      - ~/minio/data:/data
    command: server /data --console-address ":9090"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123 --ignore-warnings ARM64-COW-BUGS
    volumes:
      - ~/redis/data:/data
    restart: unless-stopped

  queuedash:
    image: ghcr.io/alexbudure/queuedash:latest
    ports:
      - "3100:3000"
    depends_on:
      - redis
    environment:
      QUEUES_CONFIG_JSON: >-
        {"queues":[{"name":"${WORKER_QUEUE_NAME:-background-tasks}","displayName":"Background Tasks","type":"bullmq","connectionUrl":"redis://:${REDIS_PASSWORD:-redis123}@redis:${REDIS_PORT:-6379}/${REDIS_DB:-0}"}]}
    restart: unless-stopped
